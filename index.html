<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Matrix Effect Fullscreen</title>
    <style>
        body { margin: 0; padding: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // Mengatur canvas agar fullscreen
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Karakter Matrix (bisa ditambah karakter lain)
    const chars = "01RアOｲBｳBｴｵPｶRｷｸAｹTｺTｻAｼMｽｾAｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
    const fontSize = 16;
    let columns = canvas.width / fontSize;
    const drops = [];

    // Inisialisasi posisi awal setiap kolom
    for (let x = 0; x < columns; x++) {
        drops[x] = 1;
    }

    function draw() {
        // Efek transparan untuk jejak karakter
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#0F0'; // Warna hijau khas Matrix
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            // Mengembalikan ke atas secara acak setelah mencapai bawah
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(draw, 33);
</script>
</body>
</html>
